<!DOCTYPE html>
<html>
    <head>
        <title>Lab4 - Exercise 1</title>
    </head>
<body>
    <input type="text" id="textInput" placeholder="Type something here..."/>
        <label id="textLabel"></label>
            <button onclick ="changeColourRed()" id="redButton" style="color:red;">Red</button>
            <button onclick ="changeColourBlue()" id="blueButton" style="color:blue;">Blue</button>
            <button onclick ="changeColourGreen()" id="greenButton" style="color:green;">Green</button>
            <button onclick ="changeColourOrange()" id="orangeButton" style="color:orange;">Orange</button>
            <button onclick ="changeColourPurple()" id="purpleButton" style="color:purple;">Purple</button>
</body>
<script type="text/javascript">
    function changeColourRed(){
        var textInputElement = document.getElementById("textLabel");
        textInputElement.style.color = 'red';
    }
    function changeColourBlue(){
        var textInputElement = document.getElementById("textLabel");
        textInputElement.style.color = 'blue';
    }
    function changeColourGreen(){
        var textInputElement = document.getElementById("textLabel");
        textInputElement.style.color = 'green';
    }
    function changeColourOrange(){
        var textInputElement = document.getElementById("textLabel");
        textInputElement.style.color = 'orange';
    }
    function changeColourPurple(){
        var textInputElement = document.getElementById("textLabel");
        textInputElement.style.color = 'purple';
    }
    const textLabel = document.getElementById("textLabel");
    const textInput = document.getElementById("textInput");
    
    textInput.addEventListener("keydown", (event)=>{
        if(event.key === "Enter"){
            textLabel.textContent = textInput.value;
        }
    });
    
</script>
</html>
